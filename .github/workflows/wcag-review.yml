name: WCAG accessibility review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    # Set the repo variable WCAG_BOT_ENABLED=true to turn the bot on.
    # Until then the workflow is visible in the repo but is cleanly skipped
    # on every PR (avoids a failing check when ANTHROPIC_API_KEY isn't set).
    if: ${{ vars.WCAG_BOT_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bot/package-lock.json

      - name: Install bot dependencies
        working-directory: bot
        run: npm ci

      - name: Run WCAG review
        working-directory: bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: npm run review
