<header class="login-header">
  <img src="/banner.png" class="hero-banner" />
  <div class="header-tools">
    <button type="button" class="header-btn" (click)="onSearch()">
      <i class="pi pi-search"></i>
    </button>
    <button type="button" class="header-btn" (click)="onUserMenu()">
      <i class="pi pi-user"></i>
    </button>
  </div>
  <p class="header-help">
    Don't have an account? <a (click)="onHelp()">Click here</a> to sign up.
  </p>
</header>

<div class="login-page">
  <img src="/logo.svg" class="logo" />

  <div class="login-card">
    <h2>Sign in to Validis</h2>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm">
      <input
        pInputText
        type="email"
        placeholder="Email"
        name="email"
        [(ngModel)]="email"
        class="form-input"
      />

      <input
        pInputText
        type="password"
        placeholder="Password"
        name="password"
        [(ngModel)]="password"
        class="form-input"
      />

      <div class="remember-row">
        <!-- Correct pattern: p-checkbox with inputId is associated with <label for=...> -->
        <p-checkbox inputId="rememberMe" name="rememberMe" [(ngModel)]="rememberMe" binary="true"></p-checkbox>
        <label for="rememberMe">Remember me</label>
      </div>

      <p-button label="Sign in" type="submit" styleClass="full-width"></p-button>

      <div class="forgot-link" (click)="onForgot()">Forgot password?</div>

      <p class="help-text">
        Need help signing in? <a (click)="onHelp()">Click here</a> for assistance.
      </p>
    </form>
  </div>
</div>
