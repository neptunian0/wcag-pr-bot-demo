<div class="page">
  <header class="page-header">
    <h1>Engagements</h1>
    <div class="header-actions">
      <!-- Correct pattern: action buttons have visible text labels -->
      <p-button label="New engagement" icon="pi pi-plus" (onClick)="onCreate()"></p-button>
      <p-button label="Import data" icon="pi pi-upload" severity="secondary" (onClick)="onImport()"></p-button>

      <!-- A11Y-ISSUE: E4 — disabled button styled with 0.4 opacity, fails non-text contrast (WCAG 1.4.11, Non-blocking) -->
      <button
        type="button"
        class="generate-report"
        [disabled]="!reportsAvailable"
        (click)="onGenerateReport()"
      >
        Generate report
      </button>
    </div>
  </header>

  <!-- A11Y-ISSUE: E5 — sortable column headers have no static aria-sort attribute (WCAG 1.3.1, Non-blocking) -->
  <p-table [value]="engagements" sortMode="single" styleClass="p-datatable-sm">
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="id">Reference</th>
        <th pSortableColumn="client">Client</th>
        <th pSortableColumn="status">Status</th>
        <th pSortableColumn="updated">Last updated</th>
        <th>Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-eng>
      <tr>
        <td>{{ eng.id }}</td>
        <td>{{ eng.client }}</td>
        <td>
          <!-- A11Y-ISSUE: E1 — status conveyed by background colour only; title is false-positive bait but not sufficient (WCAG 1.4.1, Blocking) -->
          <span
            class="status-dot"
            [class.status-active]="eng.status === 'active'"
            [class.status-review]="eng.status === 'review'"
            [class.status-archived]="eng.status === 'archived'"
            [title]="eng.status"
          ></span>
        </td>
        <td>{{ eng.updated }}</td>
        <td class="row-actions">
          <!-- A11Y-ISSUE: E2 — icon-only edit button missing aria-label (WCAG 4.1.2, Blocking) -->
          <button type="button" class="icon-btn" (click)="onEdit(eng)">
            <i class="pi pi-pencil"></i>
          </button>
          <!-- A11Y-ISSUE: E3 — icon-only delete button missing aria-label (WCAG 4.1.2, Blocking) -->
          <button type="button" class="icon-btn" (click)="onDelete(eng)">
            <i class="pi pi-trash"></i>
          </button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
